name: Quickstart CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quickstart-bootstrap-and-test:
    name: quickstart (${{ matrix.runner_name }})
    runs-on: ${{ fromJson(matrix.runs_on) }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_name: ubuntu
            runner_flavor: ubuntu
            runs_on: '["ubuntu-latest"]'
            timeout_minutes: 90
          - runner_name: self-hosted
            runner_flavor: self-hosted
            runs_on: '["self-hosted","linux"]'
            timeout_minutes: 150

    defaults:
      run:
        shell: bash
        working-directory: vllm-hust-dev-hub

    steps:
      - name: Prepare GitHub SSH key for self-hosted runner
        if: matrix.runner_name == 'self-hosted'
        env:
          VLLM_HUST_CI_SSH_PRIVATE_KEY: ${{ secrets.VLLM_HUST_CI_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${VLLM_HUST_CI_SSH_PRIVATE_KEY:-}" ]]; then
            echo "Missing secrets.VLLM_HUST_CI_SSH_PRIVATE_KEY for self-hosted quickstart CI" >&2
            exit 1
          fi

          install -d -m 700 "$GITHUB_WORKSPACE/.ssh"
          printf '%s\n' "$VLLM_HUST_CI_SSH_PRIVATE_KEY" | tr -d '\r' > "$GITHUB_WORKSPACE/.ssh/id_ed25519"
          chmod 600 "$GITHUB_WORKSPACE/.ssh/id_ed25519"

      - name: Checkout vllm-hust-dev-hub (ubuntu)
        if: matrix.runner_name != 'self-hosted'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: vllm-hust-dev-hub

      - name: Checkout vllm-hust-dev-hub (self-hosted SSH)
        if: matrix.runner_name == 'self-hosted'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: vllm-hust-dev-hub
          ssh-key: ${{ secrets.VLLM_HUST_CI_SSH_PRIVATE_KEY }}

      - name: Ensure conda is available
        env:
          HOME: ${{ github.workspace }}/.ci-home
          XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
          XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
          CONDA_SOLVER: classic
        run: |
          mkdir -p "$HOME" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME"
          if command -v conda >/dev/null 2>&1 || [[ -x "$HOME/miniconda3/bin/conda" ]]; then
            exit 0
          fi

          bash scripts/install-miniconda.sh --yes --prefix "$HOME/miniconda3"
          echo "$HOME/miniconda3/bin" >> "$GITHUB_PATH"

      - name: Run quickstart CI bootstrap and tests
        env:
          HOME: ${{ github.workspace }}/.ci-home
          XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
          XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
          CONDA_SOLVER: classic
          RUNNER_FLAVOR: ${{ matrix.runner_flavor }}
          PYTHON_VERSION: '3.11'
          INSTALL_SCOPE: full
          RESULTS_ROOT: ${{ github.workspace }}/ci-results
          CI_GITHUB_TOKEN: ${{ matrix.runner_name != 'self-hosted' && secrets.VLLM_HUST_CLONE_TOKEN || '' }}
        run: bash scripts/ci/quickstart_ci.sh

      - name: Upload quickstart CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ci-${{ matrix.runner_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ci-results
          if-no-files-found: warn
          retention-days: 14